name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        env:
          # CI build uses placeholder secrets so Next can compile pages that import auth/DB.
          # No real DB is touched and no auth ever runs.
          TURSO_DATABASE_URL: "file:./ci-placeholder.db"
          BETTER_AUTH_SECRET: "ci-placeholder-secret-not-used-at-runtime"
          BETTER_AUTH_URL: "http://localhost:3000"
        run: npm run build
